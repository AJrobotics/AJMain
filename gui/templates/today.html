<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Trades - AJ Robotics</title>
    <!-- No external chart library — pure Canvas -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 24px; background: #16213e; border-bottom: 1px solid #0f3460;
        }
        .topbar h1 { color: #00e5ff; font-size: 20px; }
        .topbar a { color: #00e5ff; text-decoration: none; font-size: 14px; }
        .topbar a:hover { text-decoration: underline; }
        .topbar .date-label { color: #8892b0; font-size: 14px; }

        .content { max-width: 1400px; margin: 0 auto; padding: 20px; }

        .section-header {
            display: flex; align-items: center; gap: 12px;
            margin: 24px 0 12px 0; padding-bottom: 8px;
            border-bottom: 2px solid #0f3460;
        }
        .section-header h2 { color: #e0e0e0; font-size: 18px; }
        .section-header .badge {
            font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: bold;
        }
        .badge-day { background: #ff6d0033; color: #ffab40; border: 1px solid #ff6d00; }
        .badge-smart { background: #7c4dff33; color: #b388ff; border: 1px solid #7c4dff; }

        .no-trades {
            color: #8892b0; font-style: italic; padding: 30px;
            text-align: center; background: #16213e; border-radius: 8px;
            border: 1px dashed #0f3460; margin: 8px 0;
        }

        .chart-card {
            background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
            margin-bottom: 16px; overflow: hidden;
        }
        .chart-card-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 16px; background: #1a2744; border-bottom: 1px solid #0f3460;
        }
        .chart-card-header .symbol { color: #00e5ff; font-size: 16px; font-weight: bold; }
        .chart-card-header .trade-count { color: #8892b0; font-size: 13px; }
        .chart-container { width: 100%; height: 500px; position: relative; }

        /* Trade popup */
        .trade-popup {
            display: none; position: fixed; z-index: 1000;
            background: #1a2744; border: 1px solid #00e5ff; border-radius: 8px;
            padding: 16px; min-width: 320px; max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .trade-popup.visible { display: block; }
        .trade-popup .popup-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #0f3460;
        }
        .trade-popup .popup-title { font-weight: bold; font-size: 15px; }
        .trade-popup .popup-close {
            cursor: pointer; color: #8892b0; font-size: 18px; line-height: 1;
            background: none; border: none; padding: 2px 6px;
        }
        .trade-popup .popup-close:hover { color: #e0e0e0; }
        .popup-buy { color: #00e676; }
        .popup-sell { color: #e94560; }

        .trade-popup .detail-row {
            display: flex; justify-content: space-between; padding: 3px 0;
            font-size: 13px;
        }
        .detail-row .label { color: #8892b0; }
        .detail-row .value { color: #e0e0e0; }

        .signal-table {
            width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 12px;
        }
        .signal-table th {
            text-align: left; color: #8892b0; padding: 4px 6px;
            border-bottom: 1px solid #0f3460; font-weight: normal;
        }
        .signal-table td { padding: 4px 6px; }
        .signal-table .sig-buy { color: #00e676; }
        .signal-table .sig-sell { color: #e94560; }
        .signal-table .sig-hold { color: #ffc107; }

        .loading {
            text-align: center; padding: 60px; color: #8892b0; font-size: 16px;
        }
        .loading .spinner {
            display: inline-block; width: 24px; height: 24px;
            border: 3px solid #0f3460; border-top-color: #00e5ff;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-right: 10px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .trade-summary {
            display: flex; gap: 24px; flex-wrap: wrap; margin: 8px 0 4px 0;
        }
        .trade-summary .stat {
            font-size: 13px; color: #8892b0;
        }
        .trade-summary .stat span { color: #e0e0e0; font-weight: bold; }

        /* Trade table */
        #dayTradeTable, #smartTradeTable {
            background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
            padding: 8px 12px; margin-top: 12px; overflow-x: auto;
        }
        #dayTradeTable table, #smartTradeTable table { margin: 0; }
        #dayTradeTable tr:hover, #smartTradeTable tr:hover { background: #1a2744; }
    </style>
</head>
<body>

<div class="topbar">
    <div style="display:flex; align-items:center; gap:16px;">
        <a href="/">Home</a>
        <a href="/trader">Trader</a>
        <a href="/politician">Politician</a>
        <h1 style="display:inline">Trades</h1>
    </div>
    <div style="display:flex; align-items:center; gap:12px;">
        <select id="dateSelect" onchange="loadTradesForDate(this.value)"
            style="background:#0d2137;color:#00e5ff;border:1px solid #0f3460;border-radius:6px;padding:5px 10px;font-size:13px;cursor:pointer;">
            <option value="">Today</option>
        </select>
        <div class="date-label" id="dateLabel"></div>
    </div>
</div>

<div class="content">
    <div id="loadingMsg" class="loading">
        <span class="spinner"></span> Loading today's trades...
    </div>

    <!-- Day Trader Section -->
    <div id="daySection" style="display:none">
        <div class="section-header">
            <h2>Day Trader</h2>
            <span class="badge badge-day">INTRADAY</span>
        </div>
        <div class="trade-summary" id="daySummary"></div>
        <div id="dayCharts"></div>
        <div id="dayTradeTable"></div>
    </div>

    <!-- Smart Trader Section -->
    <div id="smartSection" style="display:none">
        <div class="section-header">
            <h2>Smart Trader</h2>
            <span class="badge badge-smart">SWING</span>
        </div>
        <div class="trade-summary" id="smartSummary"></div>
        <div id="smartCharts"></div>
        <div id="smartTradeTable"></div>
    </div>
</div>

<!-- Trade detail popup -->
<div class="trade-popup" id="tradePopup">
    <div class="popup-header">
        <span class="popup-title" id="popupTitle"></span>
        <button class="popup-close" onclick="closePopup()">&times;</button>
    </div>
    <div id="popupContent"></div>
</div>

<script>
// ── State ──
let allTradeData = {};
const chartState = {}; // traderType -> { tradePositions, canvas, redraw }

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
    const now = new Date();
    document.getElementById('dateLabel').textContent =
        now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    loadTrades();
    loadHistory();
});

async function loadHistory() {
    try {
        const r = await fetch('/api/trader/history');
        const d = await r.json();
        const sel = document.getElementById('dateSelect');
        (d.dates || []).forEach(dt => {
            const opt = document.createElement('option');
            opt.value = dt; opt.textContent = dt;
            sel.appendChild(opt);
        });
    } catch(e) {}
}

function loadTradesForDate(dateStr) {
    const url = dateStr ? `/api/trader/today?date=${dateStr}` : '/api/trader/today';
    document.getElementById('dateLabel').textContent = dateStr || new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('loadingMsg').style.display = '';
    document.getElementById('daySection').style.display = 'none';
    document.getElementById('smartSection').style.display = 'none';
    document.getElementById('dayCharts').innerHTML = '';
    document.getElementById('smartCharts').innerHTML = '';
    loadTrades(url);
}

// Close popup on outside click
document.addEventListener('click', (e) => {
    const popup = document.getElementById('tradePopup');
    if (popup.classList.contains('visible') && !popup.contains(e.target)) {
        closePopup();
    }
});

// ── Load Trades ──
async function loadTrades(url) {
    url = url || '/api/trader/today';
    try {
        const resp = await fetch(url);
        const data = await resp.json();
        allTradeData = data;

        document.getElementById('loadingMsg').style.display = 'none';

        renderSection('day', data.day_trades, 'daySection', 'dayCharts', 'daySummary', data.date);
        renderSection('smart', data.smart_trades, 'smartSection', 'smartCharts', 'smartSummary', data.date);

        // Show sections even if empty
        document.getElementById('daySection').style.display = 'block';
        document.getElementById('smartSection').style.display = 'block';

        // Auto-save intraday bars after market close (1:05 PM PT = 16:05 ET)
        const now = new Date();
        const ptHour = now.getHours(); // Browser is PT
        const isToday = !data.date || data.date === now.toISOString().split('T')[0];
        if (isToday && ptHour >= 13 && (data.day_trades?.length || data.smart_trades?.length)) {
            fetch('/api/trader/save-intraday', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}' })
                .then(r => r.json())
                .then(d => { if (d.saved) console.log('Intraday bars cached:', d.saved, 'symbols'); })
                .catch(() => {});
        }

    } catch (err) {
        document.getElementById('loadingMsg').innerHTML =
            '<span style="color:#e94560">Failed to load trades: ' + err.message + '</span>';
    }
}

// ── Render Section — single unified chart with all symbols ──
function renderSection(traderType, trades, sectionId, chartsId, summaryId, dateStr) {
    const chartsDiv = document.getElementById(chartsId);
    const summaryDiv = document.getElementById(summaryId);

    if (!trades || trades.length === 0) {
        chartsDiv.innerHTML = '<div class="no-trades">No trades executed today</div>';
        summaryDiv.innerHTML = '';
        return;
    }

    // Summary stats
    const buys = trades.filter(t => t.side === 'BUY').length;
    const sells = trades.filter(t => t.side === 'SELL').length;
    const symbols = [...new Set(trades.map(t => t.symbol))];
    summaryDiv.innerHTML =
        `<div class="stat">Symbols: <span>${symbols.join(', ')}</span></div>` +
        `<div class="stat">Buys: <span style="color:#00e676">${buys}</span></div>` +
        `<div class="stat">Sells: <span style="color:#e94560">${sells}</span></div>` +
        `<div class="stat">Total: <span>${trades.length}</span></div>`;

    // Compute simple P&L for sells (match with most recent buy of same symbol)
    const buyPrices = {};  // symbol -> last buy price (from IB intraday data approximation)
    const sorted = [...trades].sort((a, b) => (a.time || '').localeCompare(b.time || ''));

    // Render trade table below chart
    const tableId = traderType === 'day' ? 'dayTradeTable' : 'smartTradeTable';
    const tableDiv = document.getElementById(tableId);
    if (tableDiv) {
        let thtml = `<table id="tradeTable_${traderType}" style="width:100%;border-collapse:collapse;font-size:12px;margin-top:12px;">
            <thead><tr style="border-bottom:1px solid #0f3460;color:#8892b0;">
                <th style="text-align:left;padding:6px;">Time (PT)</th>
                <th style="text-align:left;padding:6px;">Symbol</th>
                <th style="text-align:center;padding:6px;">Side</th>
                <th style="text-align:right;padding:6px;">Qty</th>
                <th style="text-align:right;padding:6px;">Score</th>
                <th style="text-align:right;padding:6px;">P&L</th>
            </tr></thead><tbody>`;
        sorted.forEach((t, idx) => {
            const isBuy = t.side === 'BUY';
            const sideColor = isBuy ? '#00e676' : '#e94560';
            const arrow = isBuy ? '&#9650;' : '&#9660;';
            const score = t.consensus_score != null ? (t.consensus_score >= 0 ? '+' : '') + t.consensus_score.toFixed(3) : '--';
            const timeStr = t.time && t.time !== 'unknown' ? t.time : '--';

            // Track buy prices, compute P&L for sells
            let pnlStr = '';
            if (isBuy && t.price) {
                buyPrices[t.symbol] = parseFloat(t.price);
            } else if (!isBuy && buyPrices[t.symbol] && t.price) {
                const sellPrice = parseFloat(t.price);
                const buyPrice = buyPrices[t.symbol];
                const pnl = (sellPrice - buyPrice) * t.quantity;
                const pnlPct = ((sellPrice - buyPrice) / buyPrice * 100).toFixed(1);
                const pnlColor = pnl >= 0 ? '#00e676' : '#e94560';
                pnlStr = `<span style="color:${pnlColor};font-weight:bold;">$${pnl >= 0 ? '+' : ''}${pnl.toFixed(0)} (${pnlPct}%)</span>`;
            }

            thtml += `<tr data-trade-idx="${idx}" data-trader="${traderType}" data-symbol="${t.symbol}" data-time="${t.time || ''}"
                style="border-bottom:1px solid #0a192f;cursor:pointer;transition:background 0.2s;"
                onmouseenter="this.style.background='#1a2744'" onmouseleave="this.style.background=''"
                onclick="highlightTrade('${traderType}', '${t.symbol}', '${t.time || ''}', ${idx})">
                <td style="padding:5px 6px;color:#00e5ff;">${timeStr}</td>
                <td style="padding:5px 6px;color:${symbolColor(t.symbol)};font-weight:bold;">${t.symbol}</td>
                <td style="padding:5px 6px;text-align:center;color:${sideColor};font-weight:bold;">${arrow} ${t.side}</td>
                <td style="padding:5px 6px;text-align:right;">${t.quantity}</td>
                <td style="padding:5px 6px;text-align:right;color:${sideColor};">${score}</td>
                <td style="padding:5px 6px;text-align:right;">${pnlStr}</td>
            </tr>`;
        });
        thtml += '</tbody></table>';
        tableDiv.innerHTML = thtml;
    }

    // Create one unified chart card
    chartsDiv.innerHTML = '';
    const card = document.createElement('div');
    card.className = 'chart-card';
    const symbolLabels = symbols.map(s => `<span style="color:${symbolColor(s)}">${s}</span>`).join(' &bull; ');
    card.innerHTML =
        `<div class="chart-card-header">
            <span class="symbol">${symbolLabels}</span>
            <span class="trade-count">
                <span style="color:#00e676">${buys} BUY</span> /
                <span style="color:#e94560">${sells} SELL</span>
            </span>
        </div>
        <div class="chart-container" id="chart_${traderType}_unified"></div>`;
    chartsDiv.appendChild(card);

    // Fetch all symbols and render unified chart
    fetchUnifiedChart(traderType, symbols, trades, dateStr);
}

// Consistent colors per symbol
const SYMBOL_COLORS = ['#00e5ff','#00e676','#ffab40','#e94560','#b388ff','#ff6d00','#64ffda','#f48fb1','#80cbc4','#ffd54f'];
function symbolColor(sym) {
    let hash = 0;
    for (let i = 0; i < sym.length; i++) hash = sym.charCodeAt(i) + ((hash << 5) - hash);
    return SYMBOL_COLORS[Math.abs(hash) % SYMBOL_COLORS.length];
}

// ── Pure Canvas Trade Timeline Chart with Price Lines ──
async function fetchUnifiedChart(traderType, symbols, trades, dateStr) {
    const chartId = `chart_${traderType}_unified`;
    const chartEl = document.getElementById(chartId);
    if (!chartEl || !trades || trades.length === 0) return;

    // Fetch intraday bars for all symbols in parallel
    const barData = {};
    const dateParam = dateStr ? `?date=${dateStr}` : '';
    await Promise.all(symbols.map(async (sym) => {
        try {
            const r = await fetch(`/api/trader/intraday/${sym}${dateParam}`);
            const d = await r.json();
            const bars = Array.isArray(d) ? d : (d.bars || []);
            if (bars.length > 0) barData[sym] = bars;
        } catch(e) {}
    }));

    drawChart(chartEl, chartId, traderType, trades, symbols, barData);
}

function drawChart(chartEl, chartId, traderType, trades, symbols, barData) {
    const canvas = document.createElement('canvas');
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    chartEl.innerHTML = '';
    chartEl.appendChild(canvas);

    const dpr = window.devicePixelRatio || 1;
    const W = chartEl.clientWidth;
    const H = chartEl.clientHeight || 500;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    function timeToMin(tStr) {
        const p = tStr.split(':');
        return parseInt(p[0]) * 60 + parseInt(p[1]) + (parseInt(p[2] || 0) / 60);
    }
    function barTimeToMin(tStr) {
        const d = new Date(tStr);
        if (isNaN(d.getTime())) return null;
        return (d.getHours() - 3) * 60 + d.getMinutes() + d.getSeconds() / 60;
    }

    const sorted = [...trades].filter(t => t.time && t.time !== 'unknown').sort((a, b) => a.time.localeCompare(b.time));
    if (sorted.length === 0) { chartEl.innerHTML = '<div class="no-trades">No trades with valid timestamps</div>'; return; }

    const minTime = Math.max(timeToMin('06:00'), timeToMin(sorted[0].time) - 15);
    const maxTime = Math.min(timeToMin('16:30'), timeToMin(sorted[sorted.length - 1].time) + 15);

    const pad = { top: 30, bottom: 40, left: 55, right: 70 };
    const plotW = W - pad.left - pad.right;
    const plotH = H - pad.top - pad.bottom;

    function xPos(tMin) { return pad.left + (tMin - minTime) / (maxTime - minTime) * plotW; }

    // Pre-compute normalized data for all symbols
    const symData = {}; // sym -> { pts: [{min, pct}], firstClose, lastClose, lastPct }
    let globalPctMin = 0, globalPctMax = 0;
    symbols.forEach(sym => {
        const bars = barData[sym];
        if (!bars || bars.length === 0) return;
        const pts = [];
        for (const bar of bars) {
            const m = barTimeToMin(bar.time);
            if (m !== null && m >= minTime && m <= maxTime) pts.push({ min: m, close: bar.close });
        }
        if (pts.length < 2) return;
        const firstClose = pts[0].close;
        const normalized = pts.map(p => ({ min: p.min, pct: (p.close / firstClose - 1) * 100, close: p.close }));
        const lastPct = normalized[normalized.length - 1].pct;
        symData[sym] = { pts: normalized, firstClose, lastClose: pts[pts.length - 1].close, lastPct };
        normalized.forEach(p => {
            if (p.pct < globalPctMin) globalPctMin = p.pct;
            if (p.pct > globalPctMax) globalPctMax = p.pct;
        });
    });

    // Add some padding to the % range
    const pctPad = Math.max((globalPctMax - globalPctMin) * 0.1, 0.2);
    globalPctMin -= pctPad;
    globalPctMax += pctPad;
    const globalPctRange = globalPctMax - globalPctMin || 1;

    function yPos(pct) { return pad.top + plotH - (pct - globalPctMin) / globalPctRange * plotH; }

    // Background
    ctx.fillStyle = '#16213e';
    ctx.fillRect(0, 0, W, H);

    // Hour grid lines
    ctx.strokeStyle = '#1a2744';
    ctx.lineWidth = 1;
    ctx.fillStyle = '#8892b0';
    ctx.font = '11px Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    for (let hr = Math.ceil(minTime / 60); hr * 60 <= maxTime; hr++) {
        const x = xPos(hr * 60);
        ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + plotH); ctx.stroke();
        ctx.fillText((hr > 12 ? hr - 12 : hr) + ':00' + (hr >= 12 ? ' PM' : ' AM'), x, pad.top + plotH + 18);
    }

    // % grid lines
    ctx.textAlign = 'right';
    ctx.font = '10px Consolas, monospace';
    const pctStep = globalPctRange > 8 ? 2 : globalPctRange > 3 ? 1 : 0.5;
    for (let p = Math.ceil(globalPctMin / pctStep) * pctStep; p <= globalPctMax; p += pctStep) {
        const y = yPos(p);
        ctx.strokeStyle = '#1a2744';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + plotW, y); ctx.stroke();
        ctx.fillStyle = '#8892b0';
        ctx.fillText((p >= 0 ? '+' : '') + p.toFixed(1) + '%', pad.left - 6, y + 3);
    }

    // 0% baseline (prominent)
    const zeroY = yPos(0);
    ctx.strokeStyle = '#8892b044';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 3]);
    ctx.beginPath(); ctx.moveTo(pad.left, zeroY); ctx.lineTo(pad.left + plotW, zeroY); ctx.stroke();
    ctx.setLineDash([]);

    const tradePositions = [];

    // Draw all symbol lines on the shared axis
    symbols.forEach(sym => {
        const sd = symData[sym];
        if (!sd) return;

        // Draw line
        ctx.strokeStyle = symbolColor(sym);
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        sd.pts.forEach((pt, j) => {
            const x = xPos(pt.min);
            const y = yPos(pt.pct);
            if (j === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
        ctx.globalAlpha = 1.0;

        // Label on right: symbol + % change
        const ly = yPos(sd.lastPct);
        const pctColor = sd.lastPct >= 0 ? '#00e676' : '#e94560';
        ctx.fillStyle = symbolColor(sym);
        ctx.font = 'bold 10px Consolas, monospace';
        ctx.textAlign = 'left';
        ctx.fillText(sym, pad.left + plotW + 4, ly - 2);
        ctx.fillStyle = pctColor;
        ctx.font = '10px Consolas, monospace';
        ctx.fillText((sd.lastPct >= 0 ? '+' : '') + sd.lastPct.toFixed(2) + '%', pad.left + plotW + 4, ly + 10);

        // Trade markers
        const symTrades = sorted.filter(t => t.symbol === sym);
        symTrades.forEach(t => {
            const tMin = timeToMin(t.time);
            const x = xPos(tMin);
            let bestPct = sd.lastPct;
            let bestDist = Infinity;
            for (const pt of sd.pts) {
                const d = Math.abs(pt.min - tMin);
                if (d < bestDist) { bestDist = d; bestPct = pt.pct; }
            }
            const y = yPos(bestPct);
            const isBuy = t.side === 'BUY';
            ctx.fillStyle = isBuy ? '#00e676' : '#e94560';
            if (isBuy) {
                ctx.beginPath(); ctx.moveTo(x, y - 10); ctx.lineTo(x - 5, y - 2); ctx.lineTo(x + 5, y - 2); ctx.closePath(); ctx.fill();
            } else {
                ctx.beginPath(); ctx.moveTo(x, y + 10); ctx.lineTo(x - 5, y + 2); ctx.lineTo(x + 5, y + 2); ctx.closePath(); ctx.fill();
            }
            tradePositions.push({ x, y, trade: t, radius: 12 });
        });
    });

    // Fallback: symbols with no bar data — markers at 0% line
    symbols.forEach(sym => {
        if (symData[sym]) return;
        const symTrades = sorted.filter(t => t.symbol === sym);
        symTrades.forEach(t => {
            const tMin = timeToMin(t.time);
            const x = xPos(tMin);
            const y = zeroY;
            const isBuy = t.side === 'BUY';
            ctx.fillStyle = isBuy ? '#00e676' : '#e94560';
            if (isBuy) {
                ctx.beginPath(); ctx.moveTo(x, y - 10); ctx.lineTo(x - 5, y - 2); ctx.lineTo(x + 5, y - 2); ctx.closePath(); ctx.fill();
            } else {
                ctx.beginPath(); ctx.moveTo(x, y + 10); ctx.lineTo(x - 5, y + 2); ctx.lineTo(x + 5, y + 2); ctx.closePath(); ctx.fill();
            }
            tradePositions.push({ x, y, trade: t, radius: 12 });
        });
    });

    // Click handler
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        for (const tp of tradePositions) {
            if (Math.abs(mx - tp.x) < tp.radius && Math.abs(my - tp.y) < tp.radius) {
                showPopup(tp.trade, { x: e.clientX, y: e.clientY });
                return;
            }
        }
    });

    // Cursor on hover
    canvas.style.cursor = 'default';
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        let hit = false;
        for (const tp of tradePositions) {
            if (Math.abs(mx - tp.x) < tp.radius && Math.abs(my - tp.y) < tp.radius) { hit = true; break; }
        }
        canvas.style.cursor = hit ? 'pointer' : 'default';
    });

    // Store state for highlight
    chartState[traderType] = {
        tradePositions,
        canvas,
        redraw: () => drawChart(chartEl, chartId, traderType, trades, symbols, barData),
        drawCtx: ctx, dpr, W, H,
    };

    // Resize
    new ResizeObserver(() => {
        const newW = chartEl.clientWidth;
        if (Math.abs(newW - W) > 10) drawChart(chartEl, chartId, traderType, trades, symbols, barData);
    }).observe(chartEl);
}

// ── Popup ──
function showPopup(trade, point) {
    const popup = document.getElementById('tradePopup');
    const title = document.getElementById('popupTitle');
    const content = document.getElementById('popupContent');

    const isBuy = trade.side === 'BUY';
    title.innerHTML = `<span class="${isBuy ? 'popup-buy' : 'popup-sell'}">
        ${isBuy ? '&#9650;' : '&#9660;'} ${trade.side}</span> ${trade.symbol}`;

    let html = '';

    // Trade details
    html += `<div class="detail-row"><span class="label">Time</span><span class="value">${trade.time || 'N/A'}</span></div>`;
    html += `<div class="detail-row"><span class="label">Quantity</span><span class="value">${trade.quantity} shares</span></div>`;
    html += `<div class="detail-row"><span class="label">Mode</span><span class="value">${trade.mode || 'AUTO'}</span></div>`;
    if (trade.order_id) {
        html += `<div class="detail-row"><span class="label">Order ID</span><span class="value">${trade.order_id}</span></div>`;
    }
    if (trade.consensus_score !== null && trade.consensus_score !== undefined) {
        const score = trade.consensus_score;
        const scoreColor = score > 0 ? '#00e676' : score < 0 ? '#e94560' : '#ffc107';
        html += `<div class="detail-row"><span class="label">Consensus</span>` +
                `<span class="value" style="color:${scoreColor};font-weight:bold">${score >= 0 ? '+' : ''}${score.toFixed(3)}</span></div>`;
    }

    // Strategy signals table
    if (trade.signals && trade.signals.length > 0) {
        html += `<table class="signal-table">
            <thead><tr><th>Strategy</th><th>Signal</th><th>Conf</th><th>Reason</th></tr></thead>
            <tbody>`;
        trade.signals.forEach(sig => {
            const sigClass = sig.signal === 'BUY' ? 'sig-buy' : sig.signal === 'SELL' ? 'sig-sell' : 'sig-hold';
            html += `<tr>
                <td>${sig.strategy}</td>
                <td class="${sigClass}">${sig.signal}</td>
                <td>${sig.confidence}%</td>
                <td style="color:#8892b0;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                    title="${sig.reason}">${sig.reason}</td>
            </tr>`;
        });
        html += '</tbody></table>';
    } else {
        html += '<div style="color:#8892b0;font-size:12px;margin-top:8px">No strategy signals captured</div>';
    }

    content.innerHTML = html;

    // Position popup near click (but keep on screen)
    const popupRect = { width: 380, height: 300 };
    let left = (point?.x || 400) + 20;
    let top = (point?.y || 200) + 80;

    if (left + popupRect.width > window.innerWidth - 20) {
        left = window.innerWidth - popupRect.width - 20;
    }
    if (top + popupRect.height > window.innerHeight - 20) {
        top = window.innerHeight - popupRect.height - 20;
    }

    popup.style.left = Math.max(10, left) + 'px';
    popup.style.top = Math.max(10, top) + 'px';
    popup.classList.add('visible');
}

function closePopup() {
    document.getElementById('tradePopup').classList.remove('visible');
}

// ── Highlight trade on chart when table row clicked ──
let _highlightTimer = null;
function highlightTrade(traderType, symbol, tradeTime, idx) {
    // Highlight table row
    document.querySelectorAll(`#tradeTable_${traderType} tr`).forEach(r => r.style.background = '');
    const row = document.querySelector(`#tradeTable_${traderType} tr[data-trade-idx="${idx}"]`);
    if (row) row.style.background = '#1a3a5c';

    // Scroll chart into view
    const chartEl = document.getElementById(`chart_${traderType}_unified`);
    if (chartEl) chartEl.scrollIntoView({ behavior: 'smooth', block: 'center' });

    // Draw pulsing highlight on canvas
    const state = chartState[traderType];
    if (!state) return;
    const tp = state.tradePositions.find(p => p.trade.symbol === symbol && p.trade.time === tradeTime);
    if (!tp) return;

    // Cancel previous animation
    if (_highlightTimer) { cancelAnimationFrame(_highlightTimer); _highlightTimer = null; }

    // Create overlay canvas for the highlight animation
    let overlay = chartEl.querySelector('.highlight-overlay');
    if (!overlay) {
        overlay = document.createElement('canvas');
        overlay.className = 'highlight-overlay';
        overlay.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;';
        chartEl.style.position = 'relative';
        chartEl.appendChild(overlay);
    }
    overlay.width = state.canvas.width;
    overlay.height = state.canvas.height;
    const octx = overlay.getContext('2d');
    octx.scale(state.dpr, state.dpr);

    const startTime = performance.now();
    const duration = 2500;
    const isBuy = tp.trade.side === 'BUY';
    const color = isBuy ? '0, 230, 118' : '233, 69, 96';

    function animate(now) {
        const elapsed = now - startTime;
        if (elapsed > duration) { octx.clearRect(0, 0, state.W, state.H); overlay.remove(); _highlightTimer = null; return; }
        octx.clearRect(0, 0, state.W, state.H);
        const phase = (elapsed % 800) / 800;
        const radius = 8 + phase * 20;
        const alpha = 0.7 * (1 - phase);

        // Pulsing ring
        octx.strokeStyle = `rgba(${color}, ${alpha})`;
        octx.lineWidth = 3;
        octx.beginPath(); octx.arc(tp.x, tp.y, radius, 0, Math.PI * 2); octx.stroke();

        // Solid inner circle
        octx.fillStyle = `rgba(${color}, 0.5)`;
        octx.beginPath(); octx.arc(tp.x, tp.y, 8, 0, Math.PI * 2); octx.fill();

        // Label
        const label = `${tp.trade.side} ${symbol} x${tp.trade.quantity}`;
        octx.font = 'bold 11px Consolas, monospace';
        octx.textAlign = 'center';
        octx.fillStyle = `rgba(${color}, 0.9)`;
        octx.fillText(label, tp.x, tp.y - 18);

        _highlightTimer = requestAnimationFrame(animate);
    }
    _highlightTimer = requestAnimationFrame(animate);
}
